<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 80 80">
  <defs>
    <radialGradient id="bg" cx="50%" cy="47%">
      <stop offset="0%" stop-color="#4a3f8f"/>
      <stop offset="70%" stop-color="#241e52"/>
      <stop offset="100%" stop-color="#241e52"/>
    </radialGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#ff006e"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0ff"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="80" height="80" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="40" cy="38" r="26" fill="none" stroke="url(#glow)" stroke-width="2.5" opacity="0.3" filter="url(#softglow)"/>
  <!-- Inner circle -->
  <circle cx="40" cy="38" r="22" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.7" filter="url(#neon)"/>
  <!-- Play triangle -->
  <polygon points="34,26 34,50 54,38" fill="url(#play)" filter="url(#neon)"/>
  <!-- Signal bars bottom right -->
  <rect x="54" y="60" width="4" height="6" rx="1" fill="#00f0ff" opacity="0.5"/>
  <rect x="60" y="56" width="4" height="10" rx="1" fill="#00f0ff" opacity="0.65"/>
  <rect x="66" y="52" width="4" height="14" rx="1" fill="#ff006e" opacity="0.8"/>
  <!-- Dot accent -->
  <circle cx="14" cy="66" r="2" fill="#ff006e" opacity="0.6"/>
  <circle cx="20" cy="62" r="1.5" fill="#00f0ff" opacity="0.4"/>
</svg>
