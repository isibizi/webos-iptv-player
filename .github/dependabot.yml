# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"
    groups:
      # Bundle all minor and patch npm updates into a single PR
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # typescript-eslint caps supported TypeScript at <6.1.0, so major
      # TypeScript bumps break npm ci until the toolchain catches up
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions" # Keeps .github/workflows actions up to date
    directory: "/"
    schedule:
      interval: "monthly"
