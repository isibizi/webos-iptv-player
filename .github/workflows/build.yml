name: Build IPK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install webOS CLI
        run: npm install -g @webos-tools/cli@3.2.3

      - name: Type check
        run: npx tsc --noEmit && npx tsc -p upload-service/tsconfig.json

      - name: Unit tests
        run: npx vitest run

      - name: Bundle
        run: node esbuild.config.mjs

      - name: Build upload service
        run: |
          rm -rf build/upload-service
          npx tsc -p upload-service/tsconfig.json
          cp upload-service/package.json build/upload-service/
          cp upload-service/src/services.json upload-service/src/upload-page.html build/upload-service/

      - name: Package IPK
        run: ares-package --no-minify -e "*preview-libs.js" dist build/upload-service -o .

      - name: Upload IPK
        uses: actions/upload-artifact@v7
        with:
          name: webos-iptv-player-ipk
          path: '*.ipk'

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: '*.ipk'
