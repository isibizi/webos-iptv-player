name: Build IPK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install webOS CLI
        run: npm install -g @webos-tools/cli

      - name: Type check
        run: npx tsc --noEmit

      - name: Bundle
        run: node esbuild.config.mjs

      - name: Package IPK
        run: ares-package --no-minify -e "js/preview-libs.js" dist -o .

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: webos-iptv-player-ipk
          path: '*.ipk'

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: '*.ipk'
